---
- name: import variables
  ansible.builtin.import_role:
    name: import_config

- name: Copy ssh key to bootstrap node
  ansible.builtin.copy:
    src: ssh_key
    dest: "/root/.ssh/id_rsa"
    mode: 0600

- name: Install cephadm
  ansible.builtin.dnf:
    name: cephadm
    state: present

- ansible.builtin.set_fact:
    EXTRA_INSTALL: ""

- name: check for singlehost install
  ansible.builtin.set_fact:
    EXTRA_INSTALL: "{{ EXTRA_INSTALL }} --single-host-defaults"
  when: INSTALL_TYPE is defined and INSTALL_TYPE == "singlehost"

- name: check for container registry
  ansible.builtin.set_fact:
    EXTRA_INSTALL: "{{ EXTRA_INSTALL }} --registry-url {{ REGISTRY_URL }}"
  when: REGISTRY_URL is defined

- name: check for container registry username/password
  ansible.builtin.set_fact:
    EXTRA_INSTALL: "{{ EXTRA_INSTALL }} --registry-username {{ REGISTRY_USERNAME }} --registry-password {{ REGISTRY_PASSWORD }}"
  when: REGISTRY_USERNAME is defined and REGISTRY_PASSWORD is defined

- name: check for custom base image
  ansible.builtin.set_fact:
    CEPHADM_IMAGE: "--image {{ CUSTOM_IMAGES['ceph-base'] }}"
  when: CUSTOM_IMAGES["ceph-base"] is defined

- name: Update cephadm repo and bootstrap
  when: CEPH_REPO is undefined or CEPH_REPO | length == 0
  block:
    - name: Set repo to main
      ansible.builtin.shell: cephadm add-repo --dev main

- name: Update to latest cephadm packages
  ansible.builtin.dnf:
    name:
    - cephadm
    - ceph-common
    state: latest

- name: Generate bootstrap.conf file on bootstrap host
  when: CUSTOM_IMAGES is defined
  block:
    - ansible.builtin.template:
        src: bootstrap.conf.j2
        dest: /tmp/bootstrap.conf
    - ansible.builtin.set_fact:
        EXTRA_INSTALL: "{{ EXTRA_INSTALL }} --conf /tmp/bootstrap.conf"

- name: Run bootstrap
  ansible.builtin.shell: cephadm {{ CEPHADM_IMAGE | default("") }} bootstrap --mon-ip={{ HOST_IP }} --initial-dashboard-password=x {{ EXTRA_INSTALL }}
  args:
    creates: /etc/ceph/ceph.conf
  vars:
    HOST_IP: "{{ ansible_default_ipv4.address }}"

- name: Set mon_data_avail_warn to low number to avoid warnings
  ansible.builtin.shell: ceph config set global mon_data_avail_warn 10

- name: Copy ceph ssh key to other cluster hosts
  ansible.builtin.shell: ssh-copy-id -f -i /etc/ceph/ceph.pub root@{{ item }}
  loop: "{{ groups.ceph_cluster_other_hosts }}"

- name: Copy ceph conf to other cluster hosts
  ansible.builtin.shell: scp /etc/ceph/ceph.conf root@{{ item }}:/etc/ceph/ceph.conf
  loop: "{{ groups.ceph_cluster_other_hosts }}"

- name: Add other hosts to Ceph cluster
  ansible.builtin.shell: ceph orch host add {{ item }}
  loop: "{{ groups.ceph_cluster_other_hosts }}"

- name: Label ceph cluster hosts to smb
  ansible.builtin.shell: ceph orch host label add {{ item }} smb
  loop: "{{ groups.all }}"

- name: Label ceph cluster hosts to _admin. This allows us to administer the cluster from any host
  ansible.builtin.shell: ceph orch host label add {{ item }} _admin
  loop: "{{ groups.all }}"

- name: Set custom images in Ceph's mgr
  ansible.builtin.shell:
    cmd: |
      set -euxo pipefail
      ceph config set mgr mgr/cephadm/container_image_{{ item.key |regex_replace("_image$", "")|regex_replace("^ceph-base$", "base") }} {{ item.value }}
  loop: "{{ CUSTOM_IMAGES | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: CUSTOM_IMAGES is defined

- name: Create OSD on all available devices
  ansible.builtin.shell: ceph orch apply osd --all-available-devices

- name: Wait for OSDs to be created
  ansible.builtin.shell: |
    until ceph -s|grep -q 'HEALTH_OK'; do
      sleep 5
    done

- name: Enable orchestrator module
  ansible.builtin.shell: ceph mgr module enable orchestrator
